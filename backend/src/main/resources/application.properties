# ==========================================
# AlgoLog - Development Configuration
# ==========================================
# For production, use: --spring.profiles.active=prod

# Server
server.port=8080

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/algolog}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:dev_only_secret_key_min_32_chars_long!!}
jwt.expiry-ms=${JWT_EXPIRY_MS:604800000}

# Admin
app.admin.email=${ADMIN_EMAIL:namansaini1463@gmail.com}

# Frontend URL for OAuth redirect
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# OAuth2 - Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# OAuth2 - GitHub
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Cloudinary (image uploads)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Brevo (Sendinblue) Email
brevo.api-key=${BREVO_API_KEY:}
brevo.sender-email=${BREVO_SENDER_EMAIL:namansaini1463@gmail.com}
brevo.sender-name=${BREVO_SENDER_NAME:AlgoLog}
brevo.template-id=${BREVO_TEMPLATE_ID:0}
